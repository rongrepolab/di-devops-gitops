# ──────────────────────────────────────────────
# ApplicationSet metadata  (used as template variables in argocd/)
# ──────────────────────────────────────────────
appName: di-devops-test
environment: staging
namespace: di-devops-staging

# ──────────────────────────────────────────────
# Helm values (override charts/generic-app/values.yaml)
# ──────────────────────────────────────────────
image:
  repository: ghcr.io/rongrepolab/di-devops-test
  tag: latest
  pullPolicy: Always

replicaCount: 2
containerPort: 3000

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: PORT
    value: "3000"
  - name: NODE_ENV
    value: "staging"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: di-devops-test.staging.example.com
      paths:
        - path: /
          pathType: Prefix

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
