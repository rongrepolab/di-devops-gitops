# ──────────────────────────────────────────────
# Application identity (required overrides)
# ──────────────────────────────────────────────
appName: ""       # e.g. "di-devops-test"
environment: ""   # e.g. "dev" | "staging" | "prod"

# ──────────────────────────────────────────────
# Image
# ──────────────────────────────────────────────
image:
  repository: ""           # e.g. ghcr.io/org/app
  tag: "latest"
  pullPolicy: IfNotPresent
  pullSecrets: []          # [{name: registry-creds}]

# ──────────────────────────────────────────────
# Deployment
# ──────────────────────────────────────────────
replicaCount: 1
containerPort: 3000

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

# ──────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ──────────────────────────────────────────────
# Service
# ──────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# ──────────────────────────────────────────────
# Ingress
# ──────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  # - host: app.example.com
  #   paths:
  #     - path: /
  #       pathType: Prefix
  tls: []
  # - secretName: app-tls
  #   hosts: [app.example.com]

# ──────────────────────────────────────────────
# Horizontal Pod Autoscaler
# ──────────────────────────────────────────────
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

# ──────────────────────────────────────────────
# Environment variables
# ──────────────────────────────────────────────
env: []
# - name: NODE_ENV
#   value: "production"
# - name: SECRET
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: secret-key

envFrom: []
# - configMapRef:
#     name: my-configmap
# - secretRef:
#     name: my-secret

# ──────────────────────────────────────────────
# ConfigMap
# ──────────────────────────────────────────────
configMap:
  enabled: false
  data: {}
  # APP_CONFIG: "value"

# ──────────────────────────────────────────────
# ServiceAccount
# ──────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ──────────────────────────────────────────────
# Health probes
# ──────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# ──────────────────────────────────────────────
# Scheduling
# ──────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
